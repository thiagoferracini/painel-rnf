<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal RNF v1.0.6 - Ailog Tecnologia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        .version-badge { position: absolute; top: 10px; right: 20px; font-size: 10px; color: #aaa; }
        .search-section { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1.5fr 2fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .action-bar { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 0 35px; height: 48px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8f9fa; font-size: 11px; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">v1.0.6 - Debug Mode</div>
    <h2><i class="fa-solid fa-layer-group"></i> Portal RNF</h2>

    <div class="search-section">
        <div class="input-group">
            <label>CNPJ</label>
            <input type="text" id="buscaCnpj" placeholder="CNPJ..." oninput="filtrarBanco()">
        </div>
        <div class="input-group">
            <label>RAZÃO SOCIAL</label>
            <input type="text" id="razaoShow" readonly style="background:#f1f3f5">
        </div>
        <div class="input-group">
            <label>ID</label>
            <input type="text" id="idShow" readonly style="background:#f1f3f5; font-weight:bold; color:var(--apple-blue)">
        </div>
    </div>

    <div class="action-bar">
        <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-03-01"></div>
        <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-03-31"></div>
        <div class="input-group" style="flex: 2;"><label>Token</label><input type="password" id="token" placeholder="Token..."></div>
        <button class="btn-search" onclick="consultarWebrouter()">PESQUISAR</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Posto / Cliente</th>
                <th>Total</th>
                <th>Pendente</th>
                <th>Pausado</th>
                <th>Recolhido</th>
                <th>Eficiência</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="6" style="text-align:center; padding: 40px;">Aguardando pesquisa...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let dadosPlanilha = [];
    const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv";

    window.onload = async () => {
        try {
            const res = await fetch(LINK_CSV);
            const buffer = await res.arrayBuffer();
            const csv = new TextDecoder('utf-8').decode(buffer);
            const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
            dadosPlanilha = linhas.slice(1).map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    id: c[0]?.replace(/"/g, '').trim(),
                    cnpj: c[1]?.replace(/"/g, '').replace(/\D/g, '').trim(),
                    razao: c[2]?.replace(/"/g, '').trim()
                };
            });
        } catch (e) { console.error("Erro planilha:", e); }
    };

    function filtrarBanco() {
        const busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "");
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        const token = document.getElementById('token').value;
        const corpo = document.getElementById('corpoTabela');

        // Formatação idêntica à versão local
        const fData = (d) => {
            const [a, m, dia] = d.split("-");
            return `${dia}/${m}/${a}`;
        };

        const dInicio = fData(document.getElementById('dInicio').value);
        const dFim = fData(document.getElementById('dFim').value);

        corpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Consultando...</td></tr>";

        const proxy = "https://cors-anywhere.herokuapp.com/";
        const apiUrl = "https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes";

        // MUDANÇA CRÍTICA: Enviando o ID como String e como Number para testar aceitação
        const payload = {
            "periodo": { "dataInicio": dInicio, "dataFim": dFim },
            "estabelecimento": { "id": parseInt(id) },
            "somenteMeusPostos": false
        };

        console.log("DEBUG v1.0.6 - Payload:", payload);

        try {
            const response = await fetch(proxy + apiUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'token': token, // Algumas APIs Webrouter usam 'Authorization'
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            console.log("DEBUG v1.0.6 - Resposta:", data);

            const lista = data.registros || data.content || [];

            if (lista.length === 0) {
                // Se vier vazio, vamos mostrar o que a API respondeu no log
                corpo.innerHTML = `<tr><td colspan='6' style='text-align:center;'>API respondeu com lista vazia. Verifique se o ID ${id} tem dados em ${dInicio}.</td></tr>`;
                return;
            }

            corpo.innerHTML = "";
            lista.forEach(item => {
                const total = item.valorTotal || 0;
                const recolhido = item.valorRecolhido || 0;
                const perc = total > 0 ? ((recolhido / total) * 100).toFixed(1) : "0.0";
                corpo.innerHTML += `
                    <tr>
                        <td><b>${item.cliente?.razaoSocial || 'Cliente'}</b></td>
                        <td>${f(total)}</td>
                        <td>${f(item.valorPendente)}</td>
                        <td>${f(item.valorPausado)}</td>
                        <td style="color:green">${f(recolhido)}</td>
                        <td>${perc}%</td>
                    </tr>`;
            });
        } catch (e) {
            corpo.innerHTML = `<tr><td colspan='6' style='color:red;'>Erro: ${e.message}</td></tr>`;
        }
    }
    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
