<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF | Operacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --card-bg: #ffffff;
            --alert: #d9534f; --text-main: #1d1d1f; --text-sub: #86868b; --warning: #f0ad4e; --border: #e6e6e9;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .container { max-width: 1300px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); position: relative; }
        .version-badge { position: absolute; top: 15px; right: 25px; font-size: 11px; color: #bbb; font-weight: bold; }
        
        h2 { font-weight: 700; font-size: 26px; margin: 0 0 20px 0; letter-spacing: -0.5px; }
        h2 span { font-weight: 400; color: var(--text-sub); }

        /* BUSCA */
        .search-section { background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        .input-group input[readonly] { background: #f9f9f9; color: #777; cursor: not-allowed; }

        /* DASHBOARD */
        #dashGeral { display: none; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 18px 22px; border-radius: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 90px; }
        .card-label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
        .card-value { font-size: 22px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; }

        /* TABELA */
        table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        th { text-align: left; padding: 15px; background: #fdfdfd; font-size: 11px; color: var(--text-sub); border-bottom: 2px solid var(--border); cursor: pointer; text-transform: uppercase; }
        th:hover { background: #f1f1f1; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover { background-color: #f5faff; }

        /* BOTOES */
        .btn-action { background: var(--card-bg); color: var(--primary); border: 1.5px solid var(--primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin: auto; }
        .btn-action:hover { background: var(--primary); color: white; }
        .action-bar { display: flex; gap: 12px; margin-bottom: 25px; align-items: flex-end; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-main { background: var(--apple-blue); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 8% auto; border-radius: 16px; width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .modal-header { padding: 20px 25px; background: #fdfdfd; border-bottom: 1px solid #eee; }
        .modal-body { padding: 25px; }
        .status-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-st { flex: 1; border: none; padding: 12px; border-radius: 10px; color: white; cursor: pointer; font-weight: 700; opacity: 0.4; font-size: 11px; }
        .btn-st.selected { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; box-sizing: border-box; resize: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">v1.9.0</div>
    <h2><i class="fa-solid fa-layer-group" style="color:var(--primary); margin-right:10px;"></i>Portal RNF <span>| Operacional</span></h2>

    <div class="search-section">
        <div class="input-group"><label>CNPJ Posto</label><input type="text" id="buscaCnpj" placeholder="00.000.000/0000-00" oninput="filtrarBanco()"></div>
        <div class="input-group"><label>Matriz / Razão</label><input type="text" id="razaoShow" readonly></div>
        <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly></div>
        <div class="input-group"><label>ID Webrouter</label><input type="text" id="idShow" readonly></div>
    </div>

    <div id="dashGeral">
        <div class="card"><div class="card-label">Total Bruto</div><div class="card-value" id="totalTrans">R$ 0,00</div></div>
        <div class="card"><div class="card-label">Recolhido</div><div class="card-value" id="totalRec" style="color:green;">R$ 0,00</div></div>
        <div class="card"><div class="card-label">Pendente</div><div class="card-value" id="totalPen" style="color:var(--alert);">R$ 0,00</div></div>
        <div class="card"><div class="card-label">Eficiência</div><div class="card-value" id="totalPerc">0%</div></div>
    </div>

    <div class="action-bar">
        <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-04-01"></div>
        <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-04-30"></div>
        <button class="btn-main" onclick="consultarWebrouter()"><i class="fa-solid fa-magnifying-glass"></i> CONSULTAR</button>
        <button class="btn-main" style="background:#1d6f42" onclick="exportarExcel()"><i class="fa-solid fa-file-excel"></i> EXPORTAR HISTÓRICO</button>
    </div>

    <table id="tabelaMaster">
        <thead>
            <tr>
                <th onclick="ordenarTabela(0)">Unidade <i class="fa-solid fa-sort"></i></th>
                <th onclick="ordenarTabela(1)">Total <i class="fa-solid fa-sort"></i></th>
                <th onclick="ordenarTabela(2)">Rec <i class="fa-solid fa-sort"></i></th>
                <th onclick="ordenarTabela(3)">% <i class="fa-solid fa-sort"></i></th>
                <th style="text-align: center;">Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="5" style="text-align:center; padding:50px; color:#aaa;">Pesquise um CNPJ para carregar unidades.</td></tr>
        </tbody>
    </table>
</div>

<div id="modalAcao" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitulo" style="margin:0;">Unidade</h3>
            <span id="modalValores" style="font-size:12px; color:var(--text-sub);">Valores</span>
        </div>
        <div class="modal-body">
            <div class="status-options">
                <button class="btn-st" style="background:var(--primary)" onclick="selectStatus('Recolhido', this)">RECOLHIDO</button>
                <button class="btn-st" style="background:var(--alert)" onclick="selectStatus('Pendente', this)">PENDENTE</button>
                <button class="btn-st" style="background:var(--warning)" onclick="selectStatus('Aguardando', this)">AGUARDANDO</button>
            </div>
            <textarea id="modalObs" rows="5" placeholder="Observações..."></textarea>
        </div>
        <div style="padding:15px 25px; background:#fdfdfd; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="fecharModal()" style="background:#888; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer;">FECHAR</button>
            <button id="btnSalvarModal" onclick="salvarAcaoModal()" style="background:var(--apple-blue); color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:600;">GRAVAR AÇÃO</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30.",
        CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv",
        URL_SCRIPT: "https://script.google.com/macros/s/AKfycbxQ8KOKzTetUQfg7vyBLTH9u6rz78HvdJhDLLAmc7wNmnO8s7CMc9SZd8Yw05DOKaL5pQ/exec"
    };

    let dadosPlanilha = [], listaAtual = [], direcaoSort = 1;
    let unidadeAtual = {}, statusSelecionado = "";

    window.onload = async () => {
        try {
            const res = await fetch(CONFIG.CSV);
            const csv = await res.text();
            const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
            dadosPlanilha = linhas.slice(1).map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { id: c[0]?.replace(/"/g, ''), cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2]?.replace(/"/g, ''), analista: c[10]?.replace(/"/g, '') };
            });
        } catch (e) { console.error("Erro no CSV."); }
    };

    function filtrarBanco() {
        let busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "").padStart(14,'0');
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('analistaShow').value = p.analista || "N/D";
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return alert("Selecione um posto.");
        const fData = (d) => d.split("-").reverse().join("/");
        
        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ "periodo": { "dataInicio": fData(document.getElementById('dInicio').value), "dataFim": fData(document.getElementById('dFim').value) }, "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false })
            });
            const data = await res.json();
            listaAtual = data.abastecimentos || [];
            
            document.getElementById('dashGeral').style.display = 'grid';
            document.getElementById('totalTrans').innerText = f(data.totalTransacionado);
            document.getElementById('totalRec').innerText = f(data.totalRecolhido);
            document.getElementById('totalPen').innerText = f(data.totalTransacionado - data.totalRecolhido);
            document.getElementById('totalPerc').innerText = (data.totalTransacionado > 0 ? (data.totalRecolhido/data.totalTransacionado*100).toFixed(1) : 0) + "%";
            
            renderizarTabela(listaAtual);
        } catch (e) { alert("Erro API Webrouter."); }
    }

    function renderizarTabela(dados) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        dados.forEach(item => {
            const t = item.valorTotal || 0, r = item.valorRecolhido || 0, p = t > 0 ? ((r/t)*100).toFixed(1) : 0;
            corpo.innerHTML += `<tr>
                <td><b>${item.cliente.razaoSocial}</b></td>
                <td>${f(t)}</td><td style="color:green; font-weight:600">${f(r)}</td>
                <td style="font-weight:700; color:${p >= 92 ? 'green' : 'var(--alert)'}">${p}%</td>
                <td style="text-align:center;"><button class="btn-action" onclick="abrirModal('${item.cliente.razaoSocial}', ${t}, ${r}, '${item.cliente.cnpj}')"><i class="fa-solid fa-pen-to-square"></i> AÇÃO</button></td>
            </tr>`;
        });
    }

    function ordenarTabela(coluna) {
        direcaoSort *= -1;
        listaAtual.sort((a, b) => {
            let vA, vB;
            if (coluna === 0) { vA = a.cliente.razaoSocial; vB = b.cliente.razaoSocial; }
            else if (coluna === 1) { vA = a.valorTotal; vB = b.valorTotal; }
            else if (coluna === 2) { vA = a.valorRecolhido; vB = b.valorRecolhido; }
            else { vA = (a.valorRecolhido/a.valorTotal); vB = (b.valorRecolhido/b.valorTotal); }
            return vA > vB ? (1 * direcaoSort) : (-1 * direcaoSort);
        });
        renderizarTabela(listaAtual);
    }

    function abrirModal(nome, total, rec, cnpjUnidade) {
        unidadeAtual = { nome, total, rec, cnpjUnidade };
        statusSelecionado = "";
        document.getElementById('modalTitulo').innerText = nome;
        document.getElementById('modalValores').innerText = `Total: ${f(total)} | Rec: ${f(rec)}`;
        document.getElementById('modalObs').value = "";
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        document.getElementById('modalAcao').style.display = 'block';
    }

    function fecharModal() { document.getElementById('modalAcao').style.display = 'none'; }

    function selectStatus(st, btn) {
        statusSelecionado = st;
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    // SALVAR COM LOGICA DE TEXTO COPIÁVEL
    async function salvarAcaoModal() {
        if(!statusSelecionado) return alert("Selecione um status!");
        const btn = document.getElementById('btnSalvarModal');
        btn.disabled = true; btn.innerText = "GRAVANDO...";

        const vTotal = unidadeAtual.total || 0;
        const vRec = unidadeAtual.rec || 0;
        const vPen = vTotal - vRec;
        const analista = document.getElementById('analistaShow').value;
        const postoNome = document.getElementById('razaoShow').value;

        const payload = {
            cnpjPosto: document.getElementById('buscaCnpj').value,
            cnpjUnidade: unidadeAtual.cnpjUnidade,
            posto: postoNome,
            unidade: unidadeAtual.nome,
            total: f(vTotal),
            rec: f(vRec),
            pendente: f(vPen),
            status: statusSelecionado,
            analista: analista,
            obs: document.getElementById('modalObs').value
        };

        try {
            await fetch(CONFIG.URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            
            if (statusSelecionado === "Pendente") {
                const msg = `Olá, somos da equipe RNF.\n\nIdentificamos uma pendência para o posto: ${postoNome}.\nUnidade: ${unidadeAtual.nome}\n\nValor Total: R$ ${f(vTotal)}\nValor Pendente: R$ ${f(vPen)}\n\nPor favor, nos envie as notas faltantes.\nAtenciosamente, ${analista}.`;
                
                if (confirm("Ação gravada! Deseja copiar a mensagem de cobrança para a área de transferência?")) {
                    navigator.clipboard.writeText(msg).then(() => {
                        alert("Texto copiado! Agora é só colar na sua ferramenta.");
                    });
                }
            } else {
                alert("Ação gravada com sucesso!");
            }
            
            fecharModal();
        } catch (e) { alert("Ação enviada."); fecharModal(); }
        finally { btn.disabled = false; btn.innerText = "GRAVAR AÇÃO"; }
    }

    async function exportarExcel() {
        const cnpjBusca = document.getElementById('buscaCnpj').value.replace(/\D/g, "");
        if(!cnpjBusca) return alert("Selecione um posto.");

        const btn = event.currentTarget;
        const originalTxt = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ACESSANDO HISTÓRICO...';
        
        try {
            const response = await fetch(`${CONFIG.URL_SCRIPT}?action=getExportData`);
            const dadosTotal = await response.json();

            const filtrados = dadosTotal.filter(item => {
                const cnpjPlanilha = String(item["CNPJ Posto"] || item.cnpjPosto || "").replace(/\D/g, "");
                return cnpjPlanilha === cnpjBusca;
            });

            if (filtrados.length === 0) {
                alert("Sem histórico na aba Historico_Acoes.");
            } else {
                const ws = XLSX.utils.json_to_sheet(filtrados);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Historico");
                XLSX.writeFile(wb, `RNF_Hist_${document.getElementById('razaoShow').value || 'Relatorio'}.xlsx`);
            }
        } catch (e) { alert("Erro ao exportar."); }
        finally { btn.innerHTML = originalTxt; }
    }

    function f(v) { return (v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
</script>
</body>
</html>
