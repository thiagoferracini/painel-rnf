<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF | Hub Operacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --card-bg: #ffffff;
            --alert: #d9534f; --text-main: #1d1d1f; --text-sub: #86868b; --border: #e6e6e9;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        
        #menuInicial { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; padding: 20px; box-sizing: border-box; }
        .hub-header { text-align: center; }
        .hub-header h1 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -1px; }
        .card-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .hub-card { 
            background: var(--card-bg); width: 280px; padding: 35px; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); cursor: pointer; text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid transparent;
        }
        .hub-card:hover { transform: translateY(-10px); border-color: var(--apple-blue); box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        .hub-card i { font-size: 45px; color: var(--apple-blue); margin-bottom: 20px; display: block; }

        .portal-wrapper { display: none; padding: 20px; }
        .btn-voltar { position: absolute; top: 25px; left: 25px; background: #eaeaec; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; z-index: 100; font-size: 11px; }
        .container { max-width: 1350px; margin: 40px auto auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); position: relative; }
        .version-badge { position: absolute; top: 15px; right: 25px; font-size: 11px; color: #bbb; font-weight: bold; }
        
        .search-section { background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        
        #dashGeral { display: none; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 18px; border-radius: 14px; border: 1px solid var(--border); }
        .card-value { font-size: 20px; font-weight: 700; }

        table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        th { text-align: left; padding: 12px 15px; background: #fdfdfd; font-size: 11px; color: var(--text-sub); border-bottom: 2px solid var(--border); cursor: pointer; transition: background 0.2s; }
        th:hover { background: #f0f0f2; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .btn-main { background: var(--apple-blue); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .dellys-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .filial-card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; text-align: center; transition: 0.2s; }
        .filial-card:hover { border-color: var(--primary); background: #fafffe; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 8% auto; border-radius: 16px; width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .btn-st { border: none; padding: 12px; border-radius: 10px; color: white; cursor: pointer; font-weight: 700; opacity: 0.4; flex: 1; transition: 0.2s; }
        .btn-st.selected { opacity: 1; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="menuInicial">
    <div class="hub-header">
        <h1>Olá, Thiago</h1>
        <p>Hub Operacional RNF</p>
    </div>
    <div class="card-container">
        <div class="hub-card" onclick="irPara('todos')">
            <i class="fa-solid fa-layer-group"></i>
            <h3>Todos os Clientes</h3>
            <p>Consulta manual v1.9.2 integrada.</p>
        </div>
        <div class="hub-card" onclick="irPara('dellys')">
            <i class="fa-solid fa-truck-fast" style="color: var(--primary);"></i>
            <h3>Projeto Dellys</h3>
            <p>Atalhos inteligentes por postos.</p>
        </div>
    </div>
</div>

<div id="portalTodos" class="portal-wrapper">
    <button class="btn-voltar" onclick="voltar()"><i class="fa-solid fa-chevron-left"></i> VOLTAR</button>
    <div class="container">
        <div class="version-badge">v2.0.4 Ordenável</div>
        <h2><i class="fa-solid fa-layer-group" style="color:var(--primary); margin-right:10px;"></i>Portal RNF <span>| Geral</span></h2>
        
        <div class="search-section">
            <div class="input-group"><label>CNPJ Posto</label><input type="text" id="buscaCnpj" placeholder="00.000.000/0000-00" oninput="filtrarBanco()"></div>
            <div class="input-group"><label>Matriz / Razão</label><input type="text" id="razaoShow" readonly></div>
            <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly></div>
            <div class="input-group"><label>ID Webrouter</label><input type="text" id="idShow" readonly></div>
        </div>

        <div id="dashGeral">
            <div class="card"><div style="font-size:10px; font-weight:700; color:var(--text-sub);">TOTAL</div><div class="card-value" id="totalTrans">R$ 0,00</div></div>
            <div class="card"><div style="font-size:10px; font-weight:700; color:var(--text-sub);">RECOLHIDO</div><div class="card-value" id="totalRec" style="color:green;">R$ 0,00</div></div>
            <div class="card"><div style="font-size:10px; font-weight:700; color:var(--text-sub);">PENDENTE</div><div class="card-value" id="totalPen" style="color:var(--alert);">R$ 0,00</div></div>
            <div class="card"><div style="font-size:10px; font-weight:700; color:var(--text-sub);">EFICIÊNCIA</div><div class="card-value" id="totalPerc">0,00%</div></div>
        </div>

        <div style="display:flex; gap:12px; margin-bottom:25px; align-items: flex-end; border-top:1px solid #eee; padding-top:20px;">
            <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-04-01"></div>
            <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-04-30"></div>
            <button class="btn-main" onclick="consultarWebrouter()"><i class="fa-solid fa-magnifying-glass"></i> CONSULTAR</button>
            <button class="btn-main" style="background:#1d6f42" onclick="exportarExcel()"><i class="fa-solid fa-file-excel"></i> EXCEL</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th onclick="ordenarTabela('cliente.razaoSocial')">Unidade <i class="fa-solid fa-sort"></i></th>
                    <th style="text-align:center;" onclick="ordenarTabela('quantidadeAbastecimentos')">Qtd <i class="fa-solid fa-sort"></i></th>
                    <th style="text-align:right;" onclick="ordenarTabela('quantidadeLitros')">Litros <i class="fa-solid fa-sort"></i></th>
                    <th style="text-align:right;" onclick="ordenarTabela('valorTotal')">Total <i class="fa-solid fa-sort"></i></th>
                    <th style="text-align:right;" onclick="ordenarTabela('valorRecolhido')">Rec <i class="fa-solid fa-sort"></i></th>
                    <th style="text-align:center;" onclick="ordenarTabela('percentual')">% <i class="fa-solid fa-sort"></i></th>
                    <th style="text-align:center;">Ação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<div id="portalDellys" class="portal-wrapper">
    <button class="btn-voltar" onclick="voltar()"><i class="fa-solid fa-chevron-left"></i> VOLTAR</button>
    <div class="container">
        <h2><i class="fa-solid fa-truck-fast" style="color:var(--primary); margin-right:10px;"></i>Projeto Dellys</h2>
        <div id="gridDellys" class="dellys-grid"></div>
    </div>
</div>

<div id="modalPostos" class="modal"><div class="modal-content"><div id="nomeFilialModal" style="padding:20px; font-weight:700; border-bottom:1px solid #eee;"></div><div id="listaPostosVinculados" style="max-height:400px; overflow-y:auto;"></div><div style="padding:15px; text-align:right;"><button onclick="fecharModalPostos()" style="padding:8px 20px; cursor:pointer; border-radius:20px; border:none;">Fechar</button></div></div></div>

<div id="modalAcao" class="modal">
    <div class="modal-content">
        <div style="padding:20px; border-bottom:1px solid #eee;"><h3 id="modalTitulo" style="margin:0;">Ação</h3><span id="modalValores" style="font-size:12px; color:#888;"></span></div>
        <div style="padding:20px;">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn-st" id="stRec" style="background:var(--primary);" onclick="selectStatus('Recolhido', this)">RECOLHIDO</button>
                <button class="btn-st" id="stPen" style="background:var(--alert);" onclick="selectStatus('Pendente', this)">PENDENTE</button>
            </div>
            <textarea id="modalObs" rows="4" style="width:100%; border-radius:8px; padding:10px; box-sizing:border-box; border:1px solid var(--border);" placeholder="Observações..."></textarea>
        </div>
        <div style="padding:15px; border-top:1px solid #eee; text-align:right;">
            <button onclick="fecharModal()" style="margin-right:15px; border:none; background:none; cursor:pointer;">Cancelar</button>
            <button id="btnGravar" onclick="salvarAcaoModal()" style="background:var(--apple-blue); color:white; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-weight:600;">GRAVAR</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = { URL_SCRIPT: "https://script.google.com/macros/s/AKfycbxQ8KOKzTetUQfg7vyBLTH9u6rz78HvdJhDLLAmc7wNmnO8s7CMc9SZd8Yw05DOKaL5pQ/exec", CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv", TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30." };

    let dadosPlanilha = [], listaAtual = [], dadosDellys = [], unidadeAtual = {}, statusSelecionado = "", ordemAsc = true;

    function irPara(aba) {
        document.getElementById('menuInicial').style.display = 'none';
        if(aba === 'todos') document.getElementById('portalTodos').style.display = 'block';
        else { document.getElementById('portalDellys').style.display = 'block'; carregarDellys(); }
    }
    function voltar() {
        document.querySelectorAll('.portal-wrapper').forEach(p => p.style.display = 'none');
        document.getElementById('menuInicial').style.display = 'flex';
    }

    window.onload = async () => {
        try {
            const res = await fetch(CONFIG.CSV);
            const csv = await res.text();
            const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
            dadosPlanilha = linhas.slice(1).map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { id: c[0]?.replace(/"/g, ''), cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2]?.replace(/"/g, ''), analista: c[10]?.replace(/"/g, '') };
            });
        } catch (e) { console.error("CSV erro"); }
    };

    async function carregarDellys() {
        const grid = document.getElementById('gridDellys');
        try {
            const res = await fetch(CONFIG.URL_SCRIPT + "?action=getDellys");
            dadosDellys = await res.json();
            grid.innerHTML = "";
            const filiais = [...new Set(dadosDellys.map(d => d.NOME_FILIAL))];
            filiais.forEach(f => {
                grid.innerHTML += `<div class="filial-card" onclick="abrirPostosFilial('${f}')"><h3>${f}</h3><p>${dadosDellys.filter(d => d.NOME_FILIAL === f).length} postos</p></div>`;
            });
        } catch (e) { grid.innerHTML = "Erro Dellys."; }
    }

    function abrirPostosFilial(nomeFilial) {
        const lista = document.getElementById('listaPostosVinculados');
        document.getElementById('nomeFilialModal').innerText = nomeFilial;
        lista.innerHTML = "";
        dadosDellys.filter(d => d.NOME_FILIAL === nomeFilial).forEach(p => {
            const item = document.createElement('div');
            item.style = "padding:15px; border-bottom:1px solid #eee; cursor:pointer;";
            item.innerHTML = `<strong>${p.CNPJ_POSTO}</strong><br><small>${p.NOME_POSTO}</small>`;
            item.onclick = () => {
                fecharModalPostos(); irPara('todos');
                document.getElementById('buscaCnpj').value = p.CNPJ_POSTO;
                filtrarBanco();
                setTimeout(() => { consultarWebrouter(); }, 600);
            };
            lista.appendChild(item);
        });
        document.getElementById('modalPostos').style.display = 'block';
    }
    function fecharModalPostos() { document.getElementById('modalPostos').style.display = 'none'; }

    function filtrarBanco() {
        let busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "").padStart(14,'0');
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('analistaShow').value = p.analista || "N/D";
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return;
        const fData = (d) => d.split("-").reverse().join("/");
        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ "periodo": { "dataInicio": fData(document.getElementById('dInicio').value), "dataFim": fData(document.getElementById('dFim').value) }, "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false })
            });
            const data = await res.json();
            listaAtual = (data.abastecimentos || []).map(item => {
                // Injetar percentual numérico para facilitar ordenação
                item.percentual = item.valorTotal > 0 ? (item.valorRecolhido / item.valorTotal * 100) : 0;
                return item;
            });
            
            document.getElementById('dashGeral').style.display = 'grid';
            document.getElementById('totalTrans').innerText = f(data.totalTransacionado);
            document.getElementById('totalRec').innerText = f(data.totalRecolhido);
            document.getElementById('totalPen').innerText = f(data.totalTransacionado - data.totalRecolhido);
            
            let perc = data.totalTransacionado > 0 ? (data.totalRecolhido / data.totalTransacionado * 100) : 0;
            document.getElementById('totalPerc').innerText = perc.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";
            
            renderizarTabela(listaAtual);
        } catch (e) { alert("Erro API."); }
    }

    // NOVA FUNÇÃO DE ORDENAÇÃO
    function ordenarTabela(coluna) {
        ordemAsc = !ordemAsc;
        listaAtual.sort((a, b) => {
            let valA = coluna.split('.').reduce((o, i) => o[i], a);
            let valB = coluna.split('.').reduce((o, i) => o[i], b);
            if (typeof valA === 'string') return ordemAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            return ordemAsc ? valA - valB : valB - valA;
        });
        renderizarTabela(listaAtual);
    }

    function renderizarTabela(dados) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        dados.forEach(item => {
            const t = item.valorTotal || 0, r = item.valorRecolhido || 0;
            const p = item.percentual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const qtd = item.quantidadeAbastecimentos || 0;
            const litros = (item.quantidadeLitros || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            corpo.innerHTML += `<tr>
                <td><div style="font-weight:700;">${item.cliente.razaoSocial}</div><div style="font-size:10px; color:#888;">${item.cliente.cnpj}</div></td>
                <td style="text-align:center;">${qtd}</td>
                <td style="text-align:right;">${litros} L</td>
                <td style="text-align:right;">${f(t)}</td>
                <td style="text-align:right; color:green;">${f(r)}</td>
                <td style="text-align:center; font-weight:700;">${p}%</td>
                <td style="text-align:center;"><button onclick="abrirModal('${item.cliente.razaoSocial}', ${t}, ${r}, '${item.cliente.cnpj}')" style="cursor:pointer; border:1px solid var(--primary); background:none; color:var(--primary); padding:5px 12px; border-radius:6px;">AÇÃO</button></td>
            </tr>`;
        });
    }

    function abrirModal(nome, total, rec, cnpjUn) {
        unidadeAtual = { nome, total, rec, cnpjUn };
        statusSelecionado = "";
        document.getElementById('modalTitulo').innerText = nome;
        document.getElementById('modalValores').innerText = `Total: ${f(total)} | Rec: ${f(rec)}`;
        document.getElementById('modalObs').value = "";
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        document.getElementById('modalAcao').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalAcao').style.display = 'none'; }
    function selectStatus(st, btn) {
        statusSelecionado = st;
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    async function salvarAcaoModal() {
        if(!statusSelecionado) return alert("Selecione um status.");
        const btn = document.getElementById('btnGravar');
        btn.disabled = true; btn.innerText = "GRAVANDO...";
        const vPen = unidadeAtual.total - unidadeAtual.rec;
        const analista = document.getElementById('analistaShow').value;
        const payload = {
            cnpjPosto: document.getElementById('buscaCnpj').value,
            cnpjUnidade: unidadeAtual.cnpjUn,
            posto: document.getElementById('razaoShow').value,
            unidade: unidadeAtual.nome,
            total: nF(unidadeAtual.total),
            rec: nF(unidadeAtual.rec),
            pendente: nF(vPen),
            status: statusSelecionado,
            analista: analista,
            obs: document.getElementById('modalObs').value
        };
        try {
            await fetch(CONFIG.URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            if(statusSelecionado === 'Pendente') {
                const msg = `Olá, sou ${analista}, equipe RNF. Pendência para: ${payload.posto}. Valor Pendente: ${f(vPen)} para ${unidadeAtual.nome} (CNPJ ${unidadeAtual.cnpjUn}). Favor enviar notas.`;
                navigator.clipboard.writeText(msg);
                alert("Gravado e Mensagem Copiada!");
            } else alert("Gravado!");
            fecharModal();
        } catch (e) { alert("Ação enviada."); fecharModal(); }
        finally { btn.disabled = false; btn.innerText = "GRAVAR"; }
    }

    async function exportarExcel() {
        const btn = event.currentTarget; btn.innerText = "BAIXANDO...";
        try {
            const res = await fetch(CONFIG.URL_SCRIPT + "?action=getExportData");
            const dados = await res.json();
            const ws = XLSX.utils.json_to_sheet(dados);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Historico");
            XLSX.writeFile(wb, "RNF_Historico.xlsx");
        } catch (e) { alert("Erro Excel."); }
        finally { btn.innerText = "EXCEL"; }
    }

    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function nF(v) { return (v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
</script>
</body>
</html>
