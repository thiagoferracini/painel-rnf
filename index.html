<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF v1.5.0 - Checklist Unidades</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --alert: #d9534f; --text: #1d1d1f; --warning: #f0ad4e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        .version-badge { position: absolute; top: 10px; right: 20px; font-size: 10px; color: #aaa; font-weight: bold; }
        
        .search-section { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        
        #dashGeral { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .card { background: #f8f9fa; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .card span { display: block; font-size: 10px; color: #888; font-weight: bold; }
        .card b { font-size: 15px; }

        .action-bar { display: flex; gap: 15px; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-main { background: var(--apple-blue); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 10px; background: #f8f9fa; font-size: 11px; color: #888; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; vertical-align: middle; }

        /* Controles por Linha */
        .row-ops { display: flex; gap: 5px; }
        .btn-st { border: none; padding: 5px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; color: white; font-weight: bold; opacity: 0.3; }
        .btn-st.active { opacity: 1; transform: scale(1.1); }
        .obs-input { width: 150px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; }
        .btn-save-row { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        .st-rec { background: var(--primary); }
        .st-pen { background: var(--alert); }
        .st-agu { background: var(--warning); }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">v1.5.0 - OPERAÇÃO POR UNIDADE</div>
    <h2><i class="fa-solid fa-list-check"></i> Checklist de Recolha por Cliente</h2>

    <div class="search-section">
        <div class="input-group"><label>CNPJ</label><input type="text" id="buscaCnpj" oninput="filtrarBanco()"></div>
        <div class="input-group"><label>Posto Matriz</label><input type="text" id="razaoShow" readonly></div>
        <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly></div>
        <div class="input-group"><label>ID</label><input type="text" id="idShow" readonly></div>
    </div>

    <div id="dashGeral">
        <div class="card"><span>Faturamento</span><b id="totalTrans">R$ 0,00</b></div>
        <div class="card"><span>Recolhido</span><b id="totalRec" style="color: green;">R$ 0,00</b></div>
        <div class="card"><span>Pendente</span><b id="totalPen" style="color: var(--alert);">R$ 0,00</b></div>
        <div class="card"><span>Eficiência</span><b id="totalPerc">0%</b></div>
    </div>

    <div class="action-bar">
        <input type="date" id="dInicio" value="2026-03-01">
        <input type="date" id="dFim" value="2026-03-31">
        <button class="btn-main" onclick="consultarWebrouter()">BUSCAR UNIDADES</button>
        <button class="btn-excel" onclick="exportarXLSX()"><i class="fa-solid fa-file-excel"></i> EXCEL DO POSTO</button>
    </div>

    <table id="tabelaMaster">
        <thead>
            <tr>
                <th>Cliente / Unidade</th>
                <th>Total</th>
                <th>Recolhido</th>
                <th>Status da Unidade</th>
                <th>Observação</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="6" style="text-align:center; padding:30px; color:#aaa;">Pesquise o posto para listar as unidades.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const CONFIG = {
        TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30.",
        CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv",
        URL_SCRIPT: "https://script.google.com/macros/s/AKfycbxQ8KOKzTetUQfg7vyBLTH9u6rz78HvdJhDLLAmc7wNmnO8s7CMc9SZd8Yw05DOKaL5pQ/exec"
    };

    let dadosPlanilha = [];

    window.onload = async () => {
        const res = await fetch(CONFIG.CSV);
        const csv = await res.text();
        const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
        dadosPlanilha = linhas.slice(1).map(l => {
            const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return { id: c[0]?.replace(/"/g, ''), cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2]?.replace(/"/g, ''), analista: c[10]?.replace(/"/g, '') };
        });
    };

    function filtrarBanco() {
        let busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "").padStart(14,'0');
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('analistaShow').value = p.analista || "N/D";
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return alert("Busque o posto primeiro.");
        
        const fData = (d) => d.split("-").reverse().join("/");
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Carregando unidades...</td></tr>";

        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ "periodo": { "dataInicio": fData(document.getElementById('dInicio').value), "dataFim": fData(document.getElementById('dFim').value) }, "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false })
            });

            const data = await res.json();
            document.getElementById('dashGeral').style.display = 'grid';
            document.getElementById('totalTrans').innerText = f(data.totalTransacionado);
            document.getElementById('totalRec').innerText = f(data.totalRecolhido);
            document.getElementById('totalPen').innerText = f(data.totalTransacionado - data.totalRecolhido);
            document.getElementById('totalPerc').innerText = (data.totalTransacionado > 0 ? (data.totalRecolhido/data.totalTransacionado*100).toFixed(1) : 0) + "%";

            corpo.innerHTML = "";
            data.abastecimentos.forEach((item, idx) => {
                corpo.innerHTML += `
                    <tr id="row-${idx}">
                        <td><b>${item.cliente.razaoSocial}</b></td>
                        <td>${f(item.valorTotal)}</td>
                        <td style="color:green">${f(item.valorRecolhido)}</td>
                        <td>
                            <div class="row-ops">
                                <button class="btn-st st-rec" onclick="setRowSt(${idx}, 'Recolhido', this)">REC</button>
                                <button class="btn-st st-pen" onclick="setRowSt(${idx}, 'Pendente', this)">PEN</button>
                                <button class="btn-st st-agu" onclick="setRowSt(${idx}, 'Aguardando', this)">AGU</button>
                            </div>
                        </td>
                        <td><input type="text" class="obs-input" id="obs-${idx}" placeholder="Obs..."></td>
                        <td><button class="btn-save-row" onclick="salvarLinha(${idx}, '${item.cliente.razaoSocial}', ${item.valorTotal}, ${item.valorRecolhido})">SALVAR</button></td>
                    </tr>`;
            });
        } catch (e) { corpo.innerHTML = "Erro ao carregar."; }
    }

    function setRowSt(idx, status, btn) {
        const row = document.getElementById(`row-${idx}`);
        row.setAttribute('data-status', status);
        row.querySelectorAll('.btn-st').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function salvarLinha(idx, unidade, total, rec) {
        const status = document.getElementById(`row-${idx}`).getAttribute('data-status');
        if(!status) return alert("Selecione um status primeiro!");

        const payload = {
            cnpj: document.getElementById('buscaCnpj').value,
            posto: document.getElementById('razaoShow').value,
            unidade: unidade,
            total: f(total),
            rec: f(rec),
            status: status,
            analista: document.getElementById('analistaShow').value,
            obs: document.getElementById(`obs-${idx}`).value
        };

        const btn = document.querySelector(`#row-${idx} .btn-save-row`);
        btn.innerText = "Salvando...";
        
        await fetch(CONFIG.URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        
        btn.innerText = "SALVO!";
        btn.style.background = "#6c757d";
    }

    function exportarXLSX() {
        // Pega a tabela, mas remove os botões para o Excel ficar limpo
        const table = document.getElementById("tabelaMaster");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, `Relatorio_Unidades_${document.getElementById('razaoShow').value}.xlsx`);
    }

    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
