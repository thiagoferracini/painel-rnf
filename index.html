<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF v1.5.5 - Modal Operacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --alert: #d9534f; --text: #1d1d1f; --warning: #f0ad4e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        
        /* Busca e Dash (v1.3.6 mantido) */
        .search-section { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }

        #dashGeral { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .card { background: #f8f9fa; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .card b { font-size: 15px; }

        .btn-main { background: var(--apple-blue); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        /* Tabela Limpa */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; font-size: 11px; color: #888; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }

        /* Estilo do Botão de Ação na Linha */
        .btn-action { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-action:hover { background: #4a9683; }

        /* MODAL CSS */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 15px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-header { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-footer { border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
        
        .status-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-st { flex: 1; border: none; padding: 10px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; opacity: 0.4; }
        .btn-st.selected { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">v1.5.5 - MODAL EDITION</div>
    <h2><i class="fa-solid fa-users-viewfinder"></i> Gestão de Recolha por Unidade</h2>

    <div class="search-section">
        <div class="input-group"><label>CNPJ</label><input type="text" id="buscaCnpj" oninput="filtrarBanco()"></div>
        <div class="input-group"><label>Matriz</label><input type="text" id="razaoShow" readonly></div>
        <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly></div>
        <div class="input-group"><label>ID</label><input type="text" id="idShow" readonly></div>
    </div>

    <div id="dashGeral">
        <div class="card"><span>Faturamento</span><b id="totalTrans">R$ 0,00</b></div>
        <div class="card"><span>Recolhido</span><b id="totalRec" style="color: green;">R$ 0,00</b></div>
        <div class="card"><span>Pendente</span><b id="totalPen" style="color: var(--alert);">R$ 0,00</b></div>
        <div class="card"><span>Eficiência</span><b id="totalPerc">0%</b></div>
    </div>

    <div class="action-bar" style="display: flex; gap: 10px; align-items: flex-end;">
        <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-03-01"></div>
        <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-03-31"></div>
        <button class="btn-main" onclick="consultarWebrouter()">BUSCAR DADOS</button>
        <button class="btn-main" style="background:#1d6f42" onclick="exportarExcel()"><i class="fa-solid fa-file-excel"></i> EXPORTAR</button>
    </div>

    <table id="tabelaMaster">
        <thead>
            <tr>
                <th>Unidade / Cliente</th>
                <th>Total Bruto</th>
                <th>Recolhido</th>
                <th>Eficiência</th>
                <th style="text-align: center;">Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="5" style="text-align:center; padding:30px; color:#aaa;">Aguardando pesquisa...</td></tr>
        </tbody>
    </table>
</div>

<div id="modalAcao" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitulo" style="margin:0; color:var(--text)">Unidade X</h3>
            <span id="modalValores" style="font-size:12px; color:#888">Total: R$ 0 | Rec: R$ 0</span>
        </div>
        
        <label style="font-size:11px; font-weight:bold; color:#666; display:block; margin-bottom:10px;">DEFINIR STATUS:</label>
        <div class="status-options">
            <button class="btn-st" style="background:var(--primary)" onclick="selectStatus('Recolhido', this)">RECOLHIDO</button>
            <button class="btn-st" style="background:var(--alert)" onclick="selectStatus('Pendente', this)">PENDENTE</button>
            <button class="btn-st" style="background:var(--warning)" onclick="selectStatus('Aguardando', this)">AGUARDANDO</button>
        </div>

        <label style="font-size:11px; font-weight:bold; color:#666; display:block; margin-bottom:10px;">OBSERVAÇÕES:</label>
        <textarea id="modalObs" rows="4" placeholder="Detalhes do contato..."></textarea>

        <div class="modal-footer">
            <button class="btn-main" style="background:#888" onclick="fecharModal()">CANCELAR</button>
            <button class="btn-main" onclick="salvarAcaoModal()">SALVAR NO HISTÓRICO</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30.",
        CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv",
        URL_SCRIPT: "https://script.google.com/macros/s/AKfycbxQ8KOKzTetUQfg7vyBLTH9u6rz78HvdJhDLLAmc7wNmnO8s7CMc9SZd8Yw05DOKaL5pQ/exec"
    };

    let dadosPlanilha = [];
    let unidadeAtual = {}; // Guarda os dados da linha clicada
    let statusSelecionado = "";

    window.onload = async () => {
        const res = await fetch(CONFIG.CSV);
        const csv = await res.text();
        const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
        dadosPlanilha = linhas.slice(1).map(l => {
            const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return { id: c[0]?.replace(/"/g, ''), cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2]?.replace(/"/g, ''), analista: c[10]?.replace(/"/g, '') };
        });
    };

    function filtrarBanco() {
        let busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "").padStart(14,'0');
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('analistaShow').value = p.analista || "N/D";
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return alert("Selecione um posto.");
        const fData = (d) => d.split("-").reverse().join("/");
        const corpo = document.getElementById('corpoTabela');
        
        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ "periodo": { "dataInicio": fData(document.getElementById('dInicio').value), "dataFim": fData(document.getElementById('dFim').value) }, "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false })
            });
            const data = await res.json();
            
            document.getElementById('dashGeral').style.display = 'grid';
            document.getElementById('totalTrans').innerText = f(data.totalTransacionado);
            document.getElementById('totalRec').innerText = f(data.totalRecolhido);
            document.getElementById('totalPen').innerText = f(data.totalTransacionado - data.totalRecolhido);
            document.getElementById('totalPerc').innerText = (data.totalTransacionado > 0 ? (data.totalRecolhido/data.totalTransacionado*100).toFixed(1) : 0) + "%";

            corpo.innerHTML = "";
            data.abastecimentos.forEach((item, idx) => {
                const t = item.valorTotal || 0, r = item.valorRecolhido || 0;
                const p = t > 0 ? ((r/t)*100).toFixed(1) : 0;
                corpo.innerHTML += `
                    <tr>
                        <td><b>${item.cliente.razaoSocial}</b></td>
                        <td>${f(t)}</td>
                        <td style="color:green">${f(r)}</td>
                        <td style="font-weight:bold; color:${p >= 92 ? 'green' : 'red'}">${p}%</td>
                        <td style="text-align:center;">
                            <button class="btn-action" onclick="abrirModal('${item.cliente.razaoSocial}', ${t}, ${r})">
                                <i class="fa-solid fa-pen-to-square"></i> AÇÃO
                            </button>
                        </td>
                    </tr>`;
            });
        } catch (e) { alert("Erro na API."); }
    }

    // FUNÇÕES DO MODAL
    function abrirModal(nome, total, rec) {
        unidadeAtual = { nome, total, rec };
        statusSelecionado = "";
        document.getElementById('modalTitulo').innerText = nome;
        document.getElementById('modalValores').innerText = `Total: ${f(total)} | Rec: ${f(rec)}`;
        document.getElementById('modalObs').value = "";
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        document.getElementById('modalAcao').style.display = 'block';
    }

    function fecharModal() { document.getElementById('modalAcao').style.display = 'none'; }

    function selectStatus(st, btn) {
        statusSelecionado = st;
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    async function salvarAcaoModal() {
        if(!statusSelecionado) return alert("Por favor, selecione um status!");
        
        const payload = {
            cnpj: document.getElementById('buscaCnpj').value,
            posto: document.getElementById('razaoShow').value,
            unidade: unidadeAtual.nome,
            total: f(unidadeAtual.total),
            rec: f(unidadeAtual.rec),
            status: statusSelecionado,
            analista: document.getElementById('analistaShow').value,
            obs: document.getElementById('modalObs').value
        };

        try {
            await fetch(CONFIG.URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Sucesso! Registro salvo na planilha.");
            fecharModal();
        } catch (e) { alert("Erro ao salvar."); }
    }

    function exportarExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById("tabelaMaster"));
        XLSX.writeFile(wb, `RNF_Unidades_${document.getElementById('razaoShow').value}.xlsx`);
    }

    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
