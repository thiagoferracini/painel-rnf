<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF | Hub Operacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --card-bg: #ffffff;
            --alert: #d9534f; --text-main: #1d1d1f; --text-sub: #86868b; --border: #e6e6e9;
            --pause: #f0ad4e; --archive: #6c757d;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; color: var(--text-main); }
        
        /* Menu Inicial */
        #menuInicial { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; padding: 20px; }
        .hub-card { 
            background: var(--card-bg); width: 280px; padding: 35px; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); cursor: pointer; text-align: center;
            transition: 0.3s ease; border: 2px solid transparent;
        }
        .hub-card:hover { transform: translateY(-10px); border-color: var(--apple-blue); }
        .hub-card i { font-size: 45px; color: var(--apple-blue); margin-bottom: 20px; display: block; }

        /* Estrutura Portal */
        .portal-wrapper { display: none; padding: 20px; }
        .container { max-width: 1400px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); position: relative; }
        .btn-voltar { position: absolute; top: 25px; left: 25px; background: #eaeaec; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; font-size: 11px; }

        /* Grid Dellys */
        .dellys-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .filial-card { background: #fff; padding: 25px; border-radius: 15px; border: 1px solid var(--border); cursor: pointer; text-align: center; transition: 0.2s; }
        .filial-card:hover { border-color: var(--primary); background: #fafffe; transform: scale(1.02); }

        /* Busca e Alertas */
        .search-section { background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        .feedback-banner { grid-column: span 4; background: #fff4e5; color: #856404; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid #ffeeba; display: none; text-align: center; }
        .highlight-input { border-color: #f0ad4e !important; background: #fffcf5 !important; box-shadow: 0 0 8px rgba(240, 173, 78, 0.2); }

        /* Tabelas e Modais */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px 10px; font-size: 11px; color: var(--text-sub); border-bottom: 2px solid var(--border); cursor: pointer; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 5% auto; border-radius: 16px; width: 550px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden; }
    </style>
</head>
<body>

<div id="menuInicial">
    <div style="text-align: center;"><h1>Olá, Thiago</h1><p>Hub Operacional RNF</p></div>
    <div style="display: flex; gap: 30px;">
        <div class="hub-card" onclick="irPara('todos')"><i class="fa-solid fa-layer-group"></i><h3>Monitoramento Geral</h3><p>Busca e Alertas</p></div>
        <div class="hub-card" onclick="irPara('dellys')"><i class="fa-solid fa-truck-fast" style="color:var(--primary)"></i><h3>Projeto Dellys</h3><p>Unidades Vinculadas</p></div>
    </div>
</div>

<div id="portalTodos" class="portal-wrapper">
    <button class="btn-voltar" onclick="voltar()">VOLTAR</button>
    <div class="container">
        <h2>Monitoramento Geral</h2>
        <div class="search-section">
            <div id="alertaHistorico" class="feedback-banner"><i class="fa-solid fa-clock-rotate-left"></i> ESTE POSTO JÁ POSSUI REGISTRO NO HISTÓRICO/FEEDBACK</div>
            <div class="input-group"><label>CNPJ Posto</label><input type="text" id="buscaCnpj" oninput="filtrarBanco()" placeholder="00.000.000/0000-00"></div>
            <div class="input-group"><label>Razão Social</label><input type="text" id="razaoShow" readonly></div>
            <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly></div>
            <div class="input-group"><label>ID Sistema</label><input type="text" id="idShow" readonly></div>
        </div>
        <div style="display:flex; gap:12px; margin-bottom:25px; align-items: flex-end;">
            <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-04-01"></div>
            <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-04-30"></div>
            <button onclick="consultarWebrouter()" style="padding:12px 25px; background:var(--apple-blue); color:white; border:none; border-radius:30px; cursor:pointer; font-weight:600;">CONSULTAR</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Unidade</th>
                    <th style="text-align:right;">Total</th>
                    <th style="text-align:right;">Recolhido</th>
                    <th style="text-align:right; color:var(--alert);">Pendente</th>
                    <th style="text-align:right; color:var(--pause);">Pausado</th>
                    <th style="text-align:right; color:var(--archive);">Arquivado</th>
                    <th style="text-align:center;">Ação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<div id="portalDellys" class="portal-wrapper">
    <button class="btn-voltar" onclick="voltar()">VOLTAR</button>
    <div class="container">
        <h2>Projeto Dellys | Filiais</h2>
        <div id="gridDellys" class="dellys-grid"></div>
    </div>
</div>

<div id="modalPostos" class="modal"><div class="modal-content"><div id="nomeFilialModal" style="padding:20px; font-weight:700; border-bottom:1px solid #eee; background:#f9f9f9;"></div><div id="listaPostosVinculados" style="max-height:450px; overflow-y:auto;"></div><div style="padding:15px; text-align:right; border-top:1px solid #eee;"><button onclick="fecharModalPostos()" style="padding:10px 25px; cursor:pointer; border-radius:20px; border:none; background:#eee;">Fechar</button></div></div></div>

<script>
    const CONFIG = { 
        TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30.",
        CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv",
        URL_SCRIPT: "https://script.google.com/macros/s/AKfycbxQ8KOKzTetUQfg7vyBLTH9u6rz78HvdJhDLLAmc7wNmnO8s7CMc9SZd8Yw05DOKaL5pQ/exec"
    };

    let dadosPlanilha = [], listaHistorico = [], listaDellys = [], listaAtual = [];

    window.onload = async () => {
        try {
            // 1. Base CSV de Analistas
            const resCsv = await fetch(CONFIG.CSV);
            const csvText = await resCsv.text();
            const linhas = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            dadosPlanilha = linhas.slice(1).map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { id: c[0], cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2], analista: c[10] };
            });

            // 2. Dados do Sheets (Histórico e Dellys)
            const [h, d] = await Promise.all([
                fetch(CONFIG.URL_SCRIPT + "?action=getExportData").then(r => r.json()),
                fetch(CONFIG.URL_SCRIPT + "?action=getDellys").then(r => r.json())
            ]);
            listaHistorico = h;
            listaDellys = d;
            console.log("Dellys carregada com sucesso:", listaDellys.length);
        } catch (e) { console.error("Erro ao carregar dados remotos."); }
    };

    function irPara(aba) {
        document.querySelectorAll('.portal-wrapper, #menuInicial').forEach(el => el.style.display = 'none');
        if(aba === 'todos') {
            document.getElementById('portalTodos').style.display = 'block';
        } else {
            document.getElementById('portalDellys').style.display = 'block';
            renderizarCardsDellys();
        }
    }

    function voltar() {
        document.querySelectorAll('.portal-wrapper').forEach(p => p.style.display = 'none');
        document.getElementById('menuInicial').style.display = 'flex';
    }

    // Lógica Inteligente Projeto Dellys
    function renderizarCardsDellys() {
        const grid = document.getElementById('gridDellys');
        grid.innerHTML = "";
        if (!listaDellys.length) return grid.innerHTML = "<p>Sem dados.</p>";

        const chaveF = Object.keys(listaDellys[0]).find(k => k.trim().toUpperCase().includes("FILIAL"));
        const filiais = [...new Set(listaDellys.map(d => d[chaveF]))].filter(f => f);

        filiais.forEach(f => {
            const qtd = listaDellys.filter(d => d[chaveF] === f).length;
            grid.innerHTML += `
                <div class="filial-card" onclick="abrirPostosFilial('${f}')">
                    <i class="fa-solid fa-location-dot" style="color:var(--primary); font-size:24px; margin-bottom:10px;"></i>
                    <h3>${f}</h3>
                    <p>${qtd} POSTOS</p>
                </div>`;
        });
    }

    function abrirPostosFilial(nomeFilial) {
        const modal = document.getElementById('modalPostos');
        const listaUI = document.getElementById('listaPostosVinculados');
        document.getElementById('nomeFilialModal').innerText = nomeFilial;
        listaUI.innerHTML = "";

        const chaves = Object.keys(listaDellys[0]);
        const chaveF = chaves.find(k => k.trim().toUpperCase().includes("FILIAL"));
        const chaveC = chaves.find(k => k.trim().toUpperCase().includes("CNPJ"));
        const chaveP = chaves.find(k => k.trim().toUpperCase().includes("POSTO") && !k.trim().toUpperCase().includes("CNPJ"));

        listaDellys.filter(d => d[chaveF] === nomeFilial).forEach(p => {
            const cnpj = p[chaveC].toString().replace(/\D/g, "");
            const item = document.createElement('div');
            item.style = "padding:15px; border-bottom:1px solid #eee; cursor:pointer;";
            item.innerHTML = `<strong>${cnpj}</strong><br><small>${p[chaveP] || ''}</small>`;
            item.onclick = () => {
                fecharModalPostos();
                irPara('todos');
                document.getElementById('buscaCnpj').value = cnpj;
                filtrarBanco();
                setTimeout(() => consultarWebrouter(), 600);
            };
            listaUI.appendChild(item);
        });
        modal.style.display = 'block';
    }

    function filtrarBanco() {
        let busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "").padStart(14,'0');
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        const alerta = document.getElementById('alertaHistorico');
        const input = document.getElementById('buscaCnpj');

        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('analistaShow').value = p.analista || "N/D";

            const temHist = listaHistorico.some(h => (h['CNPJ Posto'] || '').toString().replace(/\D/g, "") === busca);
            alerta.style.display = temHist ? 'block' : 'none';
            input.classList.toggle('highlight-input', temHist);
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return;
        const fData = (d) => d.split("-").reverse().join("/");
        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ 
                    "periodo": { "dataInicio": fData(document.getElementById('dInicio').value), "dataFim": fData(document.getElementById('dFim').value) }, 
                    "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false 
                })
            });
            const data = await res.json();
            listaAtual = (data.abastecimentos || []).map(i => {
                i.valorPendente = (i.valorTotal || 0) - (i.valorRecolhido || 0);
                i.valorPausado = 0; i.valorArquivado = 0;
                return i;
            });
            renderizarTabela(listaAtual);
        } catch (e) { console.error("Erro API"); }
    }

    function renderizarTabela(dados) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        dados.forEach(i => {
            corpo.innerHTML += `<tr>
                <td><strong>${i.cliente.razaoSocial}</strong></td>
                <td style="text-align:right;">${f(i.valorTotal)}</td>
                <td style="text-align:right; color:green;">${f(i.valorRecolhido)}</td>
                <td style="text-align:right; color:var(--alert);">${f(i.valorPendente)}</td>
                <td style="text-align:right; color:var(--pause);">${f(i.valorPausado)}</td>
                <td style="text-align:right; color:var(--archive);">${f(i.valorArquivado)}</td>
                <td style="text-align:center;"><button style="cursor:pointer; background:none; border:1px solid var(--primary); color:var(--primary); padding:4px 10px; border-radius:5px;">AÇÃO</button></td>
            </tr>`;
        });
    }

    function fecharModalPostos() { document.getElementById('modalPostos').style.display = 'none'; }
    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
