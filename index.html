<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF v1.6.1 Pro - Ailog Tecnologia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --card-bg: #ffffff;
            --alert: #d9534f; --text-main: #1d1d1f; --text-sub: #86868b; --warning: #f0ad4e; --border: #e6e6e9;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .container { max-width: 1300px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); position: relative; }
        .version-badge { position: absolute; top: 15px; right: 25px; font-size: 11px; color: #bbb; font-weight: bold; }
        
        h2 { font-weight: 700; font-size: 28px; margin-top: 0; margin-bottom: 5px; letter-spacing: -0.5px; }
        h2 span { font-weight: 400; color: var(--text-sub); font-size: 18px; }

        .search-section { background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }

        #dashGeral { display: none; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .card-data span { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; }
        .card-data b { font-size: 18px; font-weight: 700; }

        .action-bar { display: flex; gap: 12px; margin-bottom: 25px; border-top: 1px solid var(--border); padding-top: 20px; align-items: flex-end;}
        .btn-main { background: var(--apple-blue); color: white; border: none; padding: 12px 28px; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* TABELA COM ORDENAÇÃO */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th { text-align: left; padding: 14px; background: #fdfdfd; font-size: 11px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; border-bottom: 2px solid var(--border); cursor: pointer; transition: background 0.2s; }
        th:hover { background: #f1f1f1; color: var(--text-main); }
        th i { margin-left: 5px; font-size: 10px; color: #ccc; }
        
        td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:nth-child(even) { background-color: #fbfbfb; }

        .btn-action { background: var(--card-bg); color: var(--primary); border: 1px solid var(--primary); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; margin: auto; }
        .btn-action:hover { background: var(--primary); color: white; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); margin: 8% auto; border-radius: 16px; width: 480px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); overflow: hidden; }
        .modal-header { padding: 20px 25px; background: #fdfdfd; border-bottom: 1px solid var(--border); position: relative;}
        .modal-body { padding: 25px; }
        .status-options { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-st { flex: 1; border: none; padding: 12px; border-radius: 10px; color: white; cursor: pointer; font-weight: 700; opacity: 0.5; }
        .btn-st.selected { opacity: 1; transform: translateY(-3px); }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; box-sizing: border-box; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">v1.6.1 Pro</div>
    <h2><i class="fa-solid fa-chart-line" style="color:var(--primary); margin-right:10px;"></i>Gestão de Recolha <span>por Unidade</span></h2>

    <div class="search-section">
        <div class="input-group"><label>CNPJ</label><input type="text" id="buscaCnpj" placeholder="00.000.000/0000-00" oninput="filtrarBanco()"></div>
        <div class="input-group"><label>Matriz</label><input type="text" id="razaoShow" readonly></div>
        <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly></div>
        <div class="input-group"><label>ID</label><input type="text" id="idShow" readonly></div>
    </div>

    <div id="dashGeral">
        <div class="card"><div class="card-data"><span>Faturamento</span><b id="totalTrans">R$ 0,00</b></div></div>
        <div class="card"><div class="card-data"><span>Recolhido</span><b id="totalRec" style="color: green;">R$ 0,00</b></div></div>
        <div class="card"><div class="card-data"><span>Pendente</span><b id="totalPen" style="color: var(--alert);">R$ 0,00</b></div></div>
        <div class="card"><div class="card-data"><span>Eficiência</span><b id="totalPerc">0%</b></div></div>
    </div>

    <div class="action-bar">
        <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-03-01"></div>
        <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-03-31"></div>
        <button class="btn-main" onclick="consultarWebrouter()"><i class="fa-solid fa-magnifying-glass"></i>BUSCAR DADOS</button>
        <button class="btn-main" style="background:#1d6f42" onclick="exportarExcel()"><i class="fa-solid fa-file-excel"></i>EXPORTAR</button>
    </div>

    <table id="tabelaMaster">
        <thead>
            <tr>
                <th onclick="ordenarTabela(0)">Unidade <i class="fa-solid fa-sort"></i></th>
                <th onclick="ordenarTabela(1)">Total Bruto <i class="fa-solid fa-sort"></i></th>
                <th onclick="ordenarTabela(2)">Recolhido <i class="fa-solid fa-sort"></i></th>
                <th onclick="ordenarTabela(3)">Eficiência <i class="fa-solid fa-sort"></i></th>
                <th style="text-align: center; cursor: default;">Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="5" style="text-align:center; padding:50px; color:var(--text-sub);">Pesquise o posto acima.</td></tr>
        </tbody>
    </table>
</div>

<div id="modalAcao" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitulo">Unidade X</h3>
            <span id="modalValores">Valores</span>
        </div>
        <div class="modal-body">
            <div class="status-options">
                <button class="btn-st" style="background:var(--primary)" onclick="selectStatus('Recolhido', this)">Recolhido</button>
                <button class="btn-st" style="background:var(--alert)" onclick="selectStatus('Pendente', this)">Pendente</button>
                <button class="btn-st" style="background:var(--warning)" onclick="selectStatus('Aguardando', this)">Aguardando</button>
            </div>
            <textarea id="modalObs" rows="5" placeholder="Observações..."></textarea>
        </div>
        <div style="padding: 15px 25px; display: flex; justify-content: flex-end; gap: 10px; background: #fdfdfd;">
            <button class="btn-main" style="background:#888" onclick="fecharModal()">CANCELAR</button>
            <button class="btn-main" onclick="salvarAcaoModal()">SALVAR</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = { TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30.", CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv", URL_SCRIPT: "https://script.google.com/macros/s/AKfycbxQ8KOKzTetUQfg7vyBLTH9u6rz78HvdJhDLLAmc7wNmnO8s7CMc9SZd8Yw05DOKaL5pQ/exec" };
    let dadosPlanilha = [], listaAtual = [], direcaoSort = 1;

    window.onload = async () => {
        const res = await fetch(CONFIG.CSV);
        const csv = await res.text();
        const linhas = csv.split(/\r?\n/).filter(l => l.trim() !== "");
        dadosPlanilha = linhas.slice(1).map(l => {
            const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return { id: c[0]?.replace(/"/g, ''), cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2]?.replace(/"/g, ''), analista: c[10]?.replace(/"/g, '') };
        });
    };

    function filtrarBanco() {
        let busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "").padStart(14,'0');
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('analistaShow').value = p.analista || "N/D";
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return alert("Busque o posto primeiro.");
        const fData = (d) => d.split("-").reverse().join("/");
        
        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ "periodo": { "dataInicio": fData(document.getElementById('dInicio').value), "dataFim": fData(document.getElementById('dFim').value) }, "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false })
            });
            const data = await res.json();
            listaAtual = data.abastecimentos || [];
            
            // Dashboard
            document.getElementById('dashGeral').style.display = 'grid';
            document.getElementById('totalTrans').innerText = f(data.totalTransacionado);
            document.getElementById('totalRec').innerText = f(data.totalRecolhido);
            document.getElementById('totalPen').innerText = f(data.totalTransacionado - data.totalRecolhido);
            const perc = (data.totalTransacionado > 0 ? (data.totalRecolhido/data.totalTransacionado*100).toFixed(1) : 0);
            document.getElementById('totalPerc').innerText = perc + "%";
            
            renderizarTabela(listaAtual);
        } catch (e) { alert("Erro na API."); }
    }

    function renderizarTabela(dados) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        dados.forEach(item => {
            const t = item.valorTotal || 0, r = item.valorRecolhido || 0, p = t > 0 ? ((r/t)*100).toFixed(1) : 0;
            corpo.innerHTML += `<tr>
                <td><b>${item.cliente.razaoSocial}</b></td>
                <td>${f(t)}</td><td style="color:green">${f(r)}</td>
                <td style="font-weight:700; color:${p >= 92 ? 'green' : 'var(--alert)'}">${p}%</td>
                <td style="text-align:center;"><button class="btn-action" onclick="abrirModal('${item.cliente.razaoSocial}', ${t}, ${r})">AÇÃO</button></td>
            </tr>`;
        });
    }

    function ordenarTabela(coluna) {
        direcaoSort *= -1;
        listaAtual.sort((a, b) => {
            let valA, valB;
            if (coluna === 0) { valA = a.cliente.razaoSocial; valB = b.cliente.razaoSocial; }
            else if (coluna === 1) { valA = a.valorTotal; valB = b.valorTotal; }
            else if (coluna === 2) { valA = a.valorRecolhido; valB = b.valorRecolhido; }
            else { valA = (a.valorRecolhido/a.valorTotal); valB = (b.valorRecolhido/b.valorTotal); }
            
            return valA > valB ? (1 * direcaoSort) : (-1 * direcaoSort);
        });
        renderizarTabela(listaAtual);
    }

    // MODAL FUNCTIONS (Mantidas da v1.6.0)
    function abrirModal(nome, total, rec) {
        unidadeAtual = { nome, total, rec };
        document.getElementById('modalTitulo').innerText = nome;
        document.getElementById('modalValores').innerText = `Total: ${f(total)} | Rec: ${f(rec)}`;
        document.getElementById('modalObs').value = "";
        document.getElementById('modalAcao').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalAcao').style.display = 'none'; }
    function selectStatus(st, btn) {
        statusSelecionado = st;
        document.querySelectorAll('.btn-st').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }
    async function salvarAcaoModal() {
        const payload = { cnpj: document.getElementById('buscaCnpj').value, posto: document.getElementById('razaoShow').value, unidade: unidadeAtual.nome, total: f(unidadeAtual.total), rec: f(unidadeAtual.rec), status: statusSelecionado, analista: document.getElementById('analistaShow').value, obs: document.getElementById('modalObs').value };
        await fetch(CONFIG.URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Salvo!"); fecharModal();
    }
    function exportarExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelaMaster")), "Relatorio.xlsx"); }
    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
