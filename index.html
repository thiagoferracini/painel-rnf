<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RNF - v5.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --card-bg: #ffffff; --alert: #d9534f; --dellys-gold: #ffcc00; --text-main: #1d1d1f; --border: #e6e6e9; --pause: #f39c12; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 1400px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .search-grid { display: grid; grid-template-columns: 1.2fr 1.5fr 1fr 0.5fr; gap: 15px; background: #fafafa; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 11px; font-weight: 700; color: #86868b; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        .btn-main { background: var(--apple-blue); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        
        .dellys-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .dellys-badge { background: var(--dellys-gold); color: #000; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; border: 1px solid #e1b300; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 10px; font-size: 10px; color: #86868b; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
        
        .status-recolhido { background-color: #d4edda !important; }
        .status-pendente { background-color: #f8d7da !important; }
        .status-pausado { background-color: #fff3cd !important; }

        .perc-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 10px; }
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 16px; width: 400px; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">Feedback salvo com sucesso!</div>

<div class="container">
    <div class="header">
        <h2>Portal RNF <small style="font-size:12px; color:var(--primary); font-weight:400;">v5.5 Operacional</small></h2>
        <button onclick="exportarExcel()" style="background:#1d6f42; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;"><i class="fa-solid fa-file-excel"></i> Histórico</button>
    </div>

    <div class="search-grid">
        <div class="input-group">
            <label>CNPJ Posto (Automático)</label>
            <input type="text" id="buscaCnpj" oninput="processarInputCnpj(this.value)" placeholder="00.000.000/0000-00">
            <div id="listaUnidadesDellys" class="dellys-container"></div>
        </div>
        <div class="input-group"><label>Razão Social</label><input type="text" id="razaoShow" readonly style="background:#f5f5f7;"></div>
        <div class="input-group"><label>Analista</label><input type="text" id="analistaShow" readonly style="background:#f5f5f7;"></div>
        <div class="input-group"><label>ID Webrouter</label><input type="text" id="idShow" readonly style="background:#f5f5f7;"></div>
    </div>

    <div style="display:flex; gap:15px; margin-bottom:25px; align-items:flex-end;">
        <div class="input-group"><label>Início</label><input type="date" id="dInicio" value="2026-03-01"></div>
        <div class="input-group"><label>Fim</label><input type="date" id="dFim" value="2026-04-30"></div>
        <button class="btn-main" id="btnConsultar" onclick="consultarWebrouter()">CONSULTAR API</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Unidade Cliente</th>
                <th style="text-align:right;">Total</th>
                <th style="text-align:right;">Recolhido</th>
                <th style="text-align:right;">Arquivado</th>
                <th style="text-align:right;">Pausado</th>
                <th style="text-align:center;">%</th>
                <th style="text-align:right;">Pendente</th>
                <th style="text-align:center;">Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<div id="modalAcao" class="modal"><div class="modal-content">
    <h3>Feedback do Analista</h3>
    <p id="nomeUnidadeModal" style="color:var(--apple-blue); font-weight:700;"></p>
    <div class="input-group" style="margin-bottom:15px;"><label>Status</label>
        <select id="statusAcao" style="padding:10px; border-radius:8px;">
            <option value="Recolhido">Recolhido</option>
            <option value="Pendente">Pendente</option>
            <option value="Pausado">Pausado</option>
        </select>
    </div>
    <div class="input-group" style="margin-bottom:15px;"><label>Observações</label><textarea id="obsAcao" rows="4" style="padding:10px; border-radius:8px; border:1px solid var(--border);"></textarea></div>
    <div style="display:flex; gap:10px; justify-content:flex-end;"><button onclick="fecharModal()" style="padding:10px 20px; border:none; background:#eee; cursor:pointer; border-radius:8px;">Voltar</button><button id="btnSalvar" onclick="salvarAcao()" class="btn-main">Salvar</button></div>
</div></div>

<script>
    const CONFIG = { 
        TOKEN: "eyJhbGciOiJub25lIn0.eyJkYXRhRXhwaXJhY2FvIjoxNzc1MTg1MTk3Mzg1LCJpZFJldmVuZGEiOjEsImFwaVJvdXRlciI6IlRPTVRPTSIsImlzQWRtaW5TaXN0ZW1hIjp0cnVlLCJhY2Vzc2FSb3RhSW5kaXZpZHVhbFVzdWFyaW8iOmZhbHNlLCJpc1VzYUxpY2VuY2FSZXZlbmRhIjpmYWxzZSwiaWRUcmFuc3BvcnRhZG9yIjoyMDAwMzQ5LCJpZFVzciI6MzA3OSwibm9tZVVzdWFyaW8iOiJBbmEgQy5CLldvc3phayIsIm5vbWVUcmFuc3BvcnRhZG9yIjoiVFJBTlNQT1JUQURPUkEgQUlMT0ciLCJpZERvY3RvT3duZXIiOjE4NSwiaWRFbXByZXNhIjoyLCJpc0NsaWVudGVBSUxvZyI6dHJ1ZSwiaWRMaWNlbmNhUmV2ZW5kYSI6LTEsImlkR3J1cG9Vc3IiOjMxN30.",
        CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv",
        URL_SCRIPT: "https://script.google.com/macros/s/AKfycbzhL34Iw-mkDvH8WOVh5NV_7Lkma6hzN474887qAoiL9tTtVYCyFvTp3CD3-Exc-5tF2w/exec"
    };

    let baseAnalistas = [], baseDellys = [], itemSelecionado = null, rowSelecionada = null;

    window.onload = async () => {
        try {
            const res = await fetch(CONFIG.CSV);
            const text = await res.text();
            baseAnalistas = text.split(/\r?\n/).slice(1).map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { id: c[0], cnpj: c[1]?.replace(/\D/g, '').padStart(14,'0'), razao: c[2], analista: c[10] };
            });
            baseDellys = await fetch(CONFIG.URL_SCRIPT + "?action=getDellys").then(r => r.json());
        } catch (e) { console.error("Erro inicial."); }
    };

    function processarInputCnpj(valor) {
        let limpo = valor.replace(/\D/g, "");
        if (limpo.length === 14) {
            validarPosto(limpo);
            setTimeout(() => { consultarWebrouter(); }, 300);
        }
    }

    function validarPosto(cnpj) {
        const container = document.getElementById('listaUnidadesDellys');
        container.innerHTML = ""; 
        const a = baseAnalistas.find(x => x.cnpj === cnpj);
        if(a) { 
            document.getElementById('razaoShow').value = a.razao; 
            document.getElementById('idShow').value = a.id; 
            document.getElementById('analistaShow').value = a.analista; 
        }
        const vinculadas = baseDellys.filter(i => Object.values(i).some(v => v.toString().replace(/\D/g, "") === cnpj));
        vinculadas.forEach(u => {
            container.innerHTML += `<div class="dellys-badge"><i class="fa-solid fa-truck"></i> ${u["NOME_FILIAL"] || 'UNIDADE'}</div>`;
        });
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        if(!id) return;
        const btn = document.getElementById('btnConsultar');
        btn.innerText = "BUSCANDO..."; 
        
        const fDate = (d) => d.split("-").reverse().join("/");
        try {
            // USANDO PROXY ESTÁVEL (SEM PRECISAR DE CLICAR EM LINK DE LIBERAÇÃO)
            const res = await fetch("https://corsproxy.io/?https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': CONFIG.TOKEN },
                body: JSON.stringify({ "periodo": { "dataInicio": fDate(document.getElementById('dInicio').value), "dataFim": fDate(document.getElementById('dFim').value) }, "estabelecimento": { "id": Number(id) }, "somenteMeusPostos": false })
            });
            const data = await res.json();
            renderTable(data.abastecimentos || []);
        } catch(e) { alert("Erro ao consultar Webrouter. Verifique o Token."); }
        finally { btn.innerText = "CONSULTAR API"; }
    }

    function renderTable(dados) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        dados.forEach((i, index) => {
            const total = i.valorTotal || 0, rec = i.valorRecolhido || 0;
            const arquivado = i.valorArquivado || 0; // Nova coluna
            const pausado = i.valorPausado || 0;    // Nova coluna
            const pend = total - rec - arquivado - pausado;
            
            const perc = total > 0 ? ((rec / total) * 100).toFixed(1) : "0.0";
            let color = perc == 100 ? "#e6fffb" : (perc > 0 ? "#fff7e6" : "#fff1f0");
            let textColor = perc == 100 ? "#389e0d" : (perc > 0 ? "#d46b08" : "#cf1322");

            corpo.innerHTML += `<tr id="row-${index}">
                <td><strong>${i.cliente.razaoSocial}</strong></td>
                <td style="text-align:right;">${f(total)}</td>
                <td style="text-align:right; color:green;">${f(rec)}</td>
                <td style="text-align:right; color:#666;">${f(arquivado)}</td>
                <td style="text-align:right; color:var(--pause);">${f(pausado)}</td>
                <td style="text-align:center;"><span class="perc-tag" style="background:${color}; color:${textColor};">${perc}%</span></td>
                <td style="text-align:right; color:var(--alert); font-weight:700;">${f(pend)}</td>
                <td style="text-align:center;"><button onclick='abrirModal(${JSON.stringify(i)}, "row-${index}")' style="cursor:pointer; border:1px solid var(--primary); background:none; color:var(--primary); padding:5px 12px; border-radius:6px;">AÇÃO</button></td>
            </tr>`;
        });
    }

    function abrirModal(item, rowId) { 
        itemSelecionado = item; 
        rowSelecionada = rowId;
        document.getElementById('nomeUnidadeModal').innerText = item.cliente.razaoSocial; 
        document.getElementById('modalAcao').style.display = 'block'; 
    }
    
    function fecharModal() { document.getElementById('modalAcao').style.display = 'none'; }

    async function salvarAcao() {
        const btn = document.getElementById('btnSalvar');
        const status = document.getElementById('statusAcao').value;
        btn.innerText = "GRAVANDO..."; btn.disabled = true;

        const dados = { 
            cnpjPosto: document.getElementById('buscaCnpj').value, 
            posto: document.getElementById('razaoShow').value, 
            unidade: itemSelecionado.cliente.razaoSocial, 
            total: itemSelecionado.valorTotal, rec: itemSelecionado.valorRecolhido, 
            pendente: (itemSelecionado.valorTotal - itemSelecionado.valorRecolhido), 
            status: status, analista: document.getElementById('analistaShow').value, 
            obs: document.getElementById('obsAcao').value 
        };

        try {
            await fetch(CONFIG.URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) });
            const row = document.getElementById(rowSelecionada);
            row.classList.remove('status-recolhido', 'status-pendente', 'status-pausado');
            if(status === 'Recolhido') row.classList.add('status-recolhido');
            else if(status === 'Pendente') row.classList.add('status-pendente');
            else if(status === 'Pausado') row.classList.add('status-pausado');
            fecharModal();
            const x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        } finally { btn.innerText = "Salvar"; btn.disabled = false; }
    }

    async function exportarExcel() {
        const d = await fetch(CONFIG.URL_SCRIPT + "?action=getExportData").then(r => r.json());
        const ws = XLSX.utils.json_to_sheet(d);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Feedbacks");
        XLSX.writeFile(wb, "RNF_Historico.xlsx");
    }
    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
