<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel RNF - Ailog Tecnologia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #5cb8a1; --apple-blue: #0071e3; --bg: #f5f5f7; --alert: #d9534f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { font-weight: 600; color: #1d1d1f; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-top: 0; }
        
        /* Seção de Busca */
        .search-section { background: #eef2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1.5fr 2fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        
        /* Dados do Posto */
        .info-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; border-left: 5px solid var(--apple-blue); }
        .info-item b { color: var(--apple-blue); display: block; font-size: 10px; text-transform: uppercase; }
        .info-item span { font-size: 13px; font-weight: 500; }

        /* Ações e Datas */
        .action-bar { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; padding-top: 15px; border-top: 1px solid #eee; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 12px; color: #888; }
        .input-wrapper input { padding-left: 35px !important; }

        .btn-search { background: var(--primary); color: white; border: none; padding: 0 30px; height: 48px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-search:hover { background: #4da38f; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(92, 184, 161, 0.3); }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; font-size: 11px; color: #86868b; text-transform: uppercase; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .meta-ok { color: #1e7e34; font-weight: bold; }
        .meta-alert { color: var(--alert); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-gauge-high"></i> Gestão RNF - Consultas API</h2>

    <div class="search-section">
        <div class="input-group">
            <label>CNPJ (Somente Números)</label>
            <input type="text" id="buscaCnpj" placeholder="Digite o CNPJ..." oninput="filtrarBanco()">
        </div>
        <div class="input-group">
            <label>Razão Social</label>
            <input type="text" id="razaoShow" readonly style="background:#f1f3f5">
        </div>
        <div class="input-group">
            <label>ID Estabelecimento</label>
            <input type="text" id="idShow" readonly style="background:#f1f3f5; font-weight:bold; color:var(--apple-blue)">
        </div>
    </div>

    <div id="detalhesPosto" class="info-card">
        <div class="info-item"><b>Responsável</b> <span id="infoResp">-</span></div>
        <div class="info-item"><b>Cidade/UF</b> <span id="infoCidade">-</span></div>
        <div class="info-item"><b>Endereço</b> <span id="infoEnd">-</span></div>
    </div>

    <div class="action-bar">
        <div class="input-group">
            <label>Data Início</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-calendar"></i>
                <input type="text" id="dInicio" value="01/03/2026">
            </div>
        </div>
        <div class="input-group">
            <label>Data Fim</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-calendar"></i>
                <input type="text" id="dFim" value="31/03/2026">
            </div>
        </div>
        <div class="input-group" style="flex: 2;">
            <label>Token Webrouter</label>
            <input type="password" id="token" placeholder="Insira o token de acesso...">
        </div>
        <button class="btn-search" onclick="consultarWebrouter()">
            <i class="fa-solid fa-magnifying-glass"></i> PESQUISAR
        </button>
    </div>

    <div id="tabelaArea">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>V. Total</th>
                    <th>V. Pendente</th>
                    <th>V. Pausado</th>
                    <th>V. Recolhido</th>
                    <th>Eficiência</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr><td colspan="6" style="text-align:center; padding: 40px; color:#999;">Aguardando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let dadosPlanilha = [];
    // ATENÇÃO: Substitua pelo link gerado no "Publicar na Web" (formato CSV)
    const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvPcDWisDWzvafrlP118lQ1t7RIliQDE1zTdqzJVU-r6CC4vm6CkYA0CIT18NiGRNJ4UqnBeD9lXWf/pub?output=csv";

    window.onload = async () => {
        try {
            const res = await fetch(LINK_CSV);
            const buffer = await res.arrayBuffer();
            const csv = new TextDecoder('utf-8').decode(buffer);
            const linhas = csv.split(/\r?\n/).filter(line => line.trim() !== "");
            
            dadosPlanilha = linhas.slice(1).map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    id: c[0]?.replace(/"/g, '').trim(),
                    cnpj: c[1]?.replace(/"/g, '').replace(/\D/g, '').trim(),
                    razao: c[2]?.replace(/"/g, '').trim(),
                    end: c[4]?.replace(/"/g, '').trim(),
                    num: c[5]?.replace(/"/g, '').trim(),
                    cidade: c[8]?.replace(/"/g, '').trim(),
                    uf: c[9]?.replace(/"/g, '').trim(),
                    resp: c[10]?.replace(/"/g, '').trim()
                };
            });
            console.log("Banco sincronizado.");
        } catch (e) { console.error("Erro planilha:", e); }
    };

    function filtrarBanco() {
        const busca = document.getElementById('buscaCnpj').value.replace(/\D/g, "");
        const p = dadosPlanilha.find(item => item.cnpj === busca);
        if (p) {
            document.getElementById('razaoShow').value = p.razao;
            document.getElementById('idShow').value = p.id;
            document.getElementById('infoResp').innerText = p.resp || 'N/A';
            document.getElementById('infoCidade').innerText = `${p.cidade}/${p.uf}`;
            document.getElementById('infoEnd').innerText = `${p.end}, ${p.num}`;
            document.getElementById('detalhesPosto').style.display = 'grid';
        }
    }

    async function consultarWebrouter() {
        const id = document.getElementById('idShow').value;
        const token = document.getElementById('token').value;
        const corpo = document.getElementById('corpoTabela');
        if(!id || !token) return alert("Selecione um posto e insira o token!");

        corpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Consultando API...</td></tr>";

        try {
            const response = await fetch("https://way.webrouter.com.br/recolhaDocumentos/abastecimentos/filtro/clientes", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'token': token },
                body: JSON.stringify({
                    "periodo": { "dataInicio": document.getElementById('dInicio').value, "dataFim": document.getElementById('dFim').value },
                    "estabelecimento": { "id": parseInt(id) },
                    "somenteMeusPostos": false
                })
            });

            const data = await response.json();
            let lista = data.registros || [];
            
            corpo.innerHTML = "";
            lista.forEach(item => {
                const perc = item.valorTotal > 0 ? ((item.valorRecolhido / item.valorTotal) * 100).toFixed(1) : 0;
                corpo.innerHTML += `
                    <tr>
                        <td><b>${item.cliente?.razaoSocial || 'Registro'}</b></td>
                        <td>${f(item.valorTotal)}</td>
                        <td>${f(item.valorPendente)}</td>
                        <td style="color:orange">${f(item.valorPausado)}</td>
                        <td style="color:green">${f(item.valorRecolhido)}</td>
                        <td class="${perc >= 92 ? 'meta-ok' : 'meta-alert'}">${perc}%</td>
                    </tr>`;
            });
        } catch (e) { corpo.innerHTML = `<tr><td colspan='6' style='color:red;'>Erro: ${e.message}</td></tr>`; }
    }

    function f(v) { return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
</script>
</body>
</html>
